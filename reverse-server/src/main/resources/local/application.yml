app:
  datasource:
    maximum-pool-size: 2
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/texas?useSSL=false&characterEncoding=utf8&useCompress=true
    username: root
    password: jiang5368166
  name: mythPoker-server

config:
  server:
    baseUrl: http://localhost:8080

skill:
  award:
    count: 5
  init:
    count: 2

power:
  award:
    count: 2
  init:
    count: 6

management:
  health:
    mail:
      enabled: false
  endpoints:
    beans:
      enabled: false
    web:
      base-path: /
      exposure:
        include: health,info,metrics,prometheus

netty:
  websocket:
    port: 9000
    path: /ws/texas

mybatis:
  configuration:
    default-fetch-size: 100
    default-statement-timeout: 30
    map-underscore-to-camel-case: true

server:
  tomcat:
    accept-count: 100
    accesslog:
      buffered: true
      directory: logs
      enabled: true
      file-date-format: .yyyy-MM-dd
      pattern: '%{X-Forwarded-For}i %l %u %t "%r"  %h   %s %b %D ms;'
      prefix: tomcat_access
      rename-on-rotate: true
      rotate: true
      suffix: .log
    background-processor-delay: 2s
    basedir: .
  port: 8081
  servlet:
    context-path: /texasServer

spring:
  mail:
    host: smtp.yeah.net
    port: 465
    username: # 邮箱
    password: # 授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          auth.mechanisms: LOGIN
          ssl:
            enable: true
            trust: smtp.yeah.net
          starttls:
            enable: false
            required: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  flyway:
    enabled: false   # 默认关闭
    baseline-description: baselines
    baseline-on-migrate: true
    baseline-version: 1
  redis:
    database: 1
    host: 127.0.0.1
    port: 6379
    password: jiangchao
    pool:
      max-active: 100
      max-idle: 8
      max-wait: -1
    timeout: 3000
  servlet:
    multipart:
      max-file-size: 21MB
      max-request-size: 121MB

swagger:
  enable: true
  api:
    nowVersion: http://localhost:8080
    lastVersion: http://localhost:8080
  defaultGroup:
    name: 当前最新文档
    pathRegex: /api/.*
  otherGroup:
    enable: false   # 默认关闭
    name: 新开发文档  # 可以用于版本迭代过程中API展示分组
    pathRegex: /api/v1/user/order/.*|/api/v1/user/contract/.*   # 分组正则

texas:
  register:
    mail:
      enabled: true #开启邮件注册
      from: ${TEXAS_MAIL_FROM:${TEXAS_MAIL_USERNAME:openrelay@yeah.net}}
      subject: Texas Hold'em 注册验证码
      code-expire-minutes: 10
      code-cooldown-seconds: 60
