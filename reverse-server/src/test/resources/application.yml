app:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    #url: jdbc:h2:file:~/.h2/test;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;
    username: sa
    password:
    #url: jdbc:mysql://127.0.0.1:3306/test?useSSL=false&characterEncoding=utf8&useCompress=true
    #username: root
    #password: root
    maximum-pool-size: 30

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

netty:
  websocket:
    enabled: false
